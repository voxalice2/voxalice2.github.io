    <script>
      // Note: the projectZips name may be a bit misleading, since we're working with .sprite3 instead of .sb3.
      
      var newSprite = new JSZip();
      
      function generateSvg(viewHeight) {
        var html_content = document.querySelector("#html").value;
        
        return `<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:svg="http://www.w3.org/2000/svg" width="480" height="100%" viewBox="0,0,480,${viewHeight}"><g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill="none" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="sans-serif" font-weight="normal" font-size="12" text-anchor="start" style="mix-blend-mode: normal"/><foreignObject x="0" y="0" width="100%" height="100%"><body xmlns="http://www.w3.org/1999/xhtml"><div>${html_content}</div></body></foreignObject></svg>`;
      }
      
      async function getInfo() {
        // Construct project
        
        var spriteJSON = '{"isStage":false,"name":"scroll","variables":{},"lists":{},"broadcasts":{},"blocks":{"r":{"opcode":"event_whenflagclicked","next":"t","parent":null,"inputs":{},"fields":{},"shadow":false,"topLevel":true,"x":48,"y":64},"t":{"opcode":"motion_sety","next":null,"parent":"r","inputs":{"Y":[1,[4,"180"]]},"fields":{},"shadow":false,"topLevel":false},"y":{"opcode":"event_whenkeypressed","next":"w","parent":null,"inputs":{},"fields":{"KEY_OPTION":["up arrow",null]},"shadow":false,"topLevel":true,"x":48,"y":240},"w":{"opcode":"motion_changeyby","next":"q","parent":"y","inputs":{"DY":[1,[4,"-11"]]},"fields":{},"shadow":false,"topLevel":false},"q":{"opcode":"control_if","next":null,"parent":"w","inputs":{"CONDITION":[2,"e"],"SUBSTACK":[2,"o"]},"fields":{},"shadow":false,"topLevel":false},"e":{"opcode":"operator_lt","next":null,"parent":"q","inputs":{"OPERAND1":[3,"p",[10,""]],"OPERAND2":[1,[10,"180"]]},"fields":{},"shadow":false,"topLevel":false},"p":{"opcode":"motion_yposition","next":null,"parent":"e","inputs":{},"fields":{},"shadow":false,"topLevel":false},"o":{"opcode":"motion_sety","next":null,"parent":"q","inputs":{"Y":[1,[4,"180"]]},"fields":{},"shadow":false,"topLevel":false},"u":{"opcode":"event_whenkeypressed","next":"i","parent":null,"inputs":{},"fields":{"KEY_OPTION":["down arrow",null]},"shadow":false,"topLevel":true,"x":48,"y":552},"i":{"opcode":"motion_changeyby","next":null,"parent":"u","inputs":{"DY":[1,[4,"11"]]},"fields":{},"shadow":false,"topLevel":false}},"comments":{},"currentCostume":0,"costumes":[{"name":"","bitmapResolution":1,"dataFormat":"svg","assetId":"45b9cfb67da1a1291a3aec6e8195f293","md5ext":"45b9cfb67da1a1291a3aec6e8195f293.svg","rotationCenterX":0,"rotationCenterY":0}],"sounds":[],"volume":100,"visible":true,"x":-240,"y":180,"size":100,"direction":90,"draggable":false,"rotationStyle":"all around"}';
        
        newSprite.file('sprite.json', spriteJSON);
        
        var name_of_visible_costume = JSON.parse(spriteJSON).costumes[0].md5ext;
        
        newSprite.file(name_of_visible_costume, generateSvg(parseInt(document.querySelector("#viewHeight").value) || 1000)); // Save generated SVG to newSprite
          
        return true;
      }
      
      function combine() {
        combinedSprite = newSprite;
        
        getInfo().then(function() {
          combinedSprite.generateAsync({type: "blob"}).then(function (blob) {
            saveAs(blob, "xhtml_sprite.sprite3");
          });
        });
      }
      
      function previewImage() {
        var generatedPreview = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(generateSvg(350))));
        document.querySelector("#previewImage").setAttribute('src', generatedPreview);
      }
      
      function suggestHeight() {
        // Approximate minimum height of contents of SVG
        window.frames[0].document.body.innerHTML = generateSvg(1);
        var svgBox = window.frames[0].document.querySelector("svg foreignObject div").getBoundingClientRect();
        document.querySelector("#viewHeight").value = Math.ceil(svgBox.bottom + svgBox.top + 15);
        document.querySelector("#viewHeight").focus();
      }
    </script>
